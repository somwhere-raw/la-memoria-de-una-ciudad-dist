<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-hidden="true">
  <title>Plano a mano alzada del Centro Histórico de Lima</title>

  <defs>
    <pattern id="block-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#C8B89A" stroke-width="0.6" opacity="0.35" />
    </pattern>
    <pattern id="water-hatch" width="10" height="6" patternUnits="userSpaceOnUse">
      <path d="M0,4 Q2.5,1 5,4 T10,4" stroke="#1E4D5C" stroke-width="0.7" fill="none" opacity="0.4" />
    </pattern>
  </defs>

  <!-- ══════════════════════════════════════
       EL RÍO, al norte del trazado
  ══════════════════════════════════════ -->
  <path d="M -20,58 Q 120,42 260,64 T 540,52 T 820,68 T 940,50"
        stroke="#1E4D5C" stroke-width="14" fill="none" opacity="0.28" stroke-linecap="round" />
  <path d="M -20,58 Q 120,42 260,64 T 540,52 T 820,68 T 940,50"
        stroke="none" fill="url(#water-hatch)" opacity="0.5" />
  <text x="60" y="40" font-family="monospace" font-size="11" letter-spacing="2"
        fill="#1E4D5C" opacity="0.55">RÍO RÍMAC</text>

  <!-- ══════════════════════════════════════
       CUADRÍCULA DE CALLES — trazo irregular a mano
       Avenidas (más gruesas) y jirones (finos)
  ══════════════════════════════════════ -->
  <g stroke="#2C2A27" stroke-width="2.4" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M 40,120 Q 300,116 470,122 T 860,118" />
    <path d="M 30,300 Q 260,296 520,304 T 870,298" />
    <path d="M 50,470 Q 280,466 540,472 T 850,468" />
  </g>

  <g stroke="#2C2A27" stroke-width="2.2" fill="none" opacity="0.45" stroke-linecap="round">
    <path d="M 160,90 Q 156,260 164,430 T 158,590" />
    <path d="M 430,86 Q 434,250 428,420 T 436,588" />
    <path d="M 680,92 Q 676,260 684,430 T 678,590" />
  </g>

  <g stroke="#7A5C3A" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round">
    <path d="M 100,90 Q 98,250 104,420 T 100,590" />
    <path d="M 220,88 Q 224,250 218,420 T 224,588" />
    <path d="M 300,90 Q 298,250 304,420 T 300,590" />
    <path d="M 360,88 Q 364,250 358,420 T 364,588" />
    <path d="M 500,90 Q 498,250 504,420 T 500,590" />
    <path d="M 570,88 Q 574,250 568,420 T 574,588" />
    <path d="M 620,90 Q 618,250 624,420 T 620,590" />
    <path d="M 750,88 Q 754,250 748,420 T 754,588" />
    <path d="M 800,90 Q 798,250 804,420 T 800,590" />

    <path d="M 40,200 Q 300,196 520,204 T 870,198" />
    <path d="M 45,240 Q 300,236 520,244 T 865,238" />
    <path d="M 55,360 Q 300,356 540,364 T 860,358" />
    <path d="M 50,400 Q 300,396 540,404 T 855,398" />
    <path d="M 60,530 Q 300,526 540,534 T 850,528" />
  </g>

  <!-- ══════════════════════════════════════
       PLAZA MAYOR — el bloque abierto central
  ══════════════════════════════════════ -->
  <g>
    <rect x="392" y="188" width="84" height="66" fill="none" stroke="#B07D3A" stroke-width="1.5" opacity="0.55" />
    <circle cx="434" cy="221" r="6" fill="none" stroke="#B07D3A" stroke-width="1" opacity="0.5" />
    <text x="400" y="182" font-family="monospace" font-size="9" letter-spacing="1.5"
          fill="#B07D3A" opacity="0.6">PLAZA MAYOR</text>
  </g>

  <!-- ══════════════════════════════════════
       PARQUE UNIVERSITARIO — donde todo empieza
  ══════════════════════════════════════ -->
  <g>
    <ellipse cx="185" cy="150" rx="34" ry="22" fill="url(#block-hatch)" stroke="#7A5C3A" stroke-width="1" opacity="0.6" />
    <text x="122" y="120" font-family="monospace" font-size="8" letter-spacing="1"
          fill="#7A5C3A" opacity="0.55">PARQUE UNIVERSITARIO</text>
  </g>

  <!-- ══════════════════════════════════════
       MANZANAS — bloques de edificación con textura hatch,
       distribuidas alrededor de las zonas documentadas por Gabriel
  ══════════════════════════════════════ -->
  <g fill="url(#block-hatch)" stroke="#3D3A35" stroke-width="0.6" opacity="0.55">
    <rect x="330" y="150" width="52" height="40" />
    <rect x="470" y="230" width="58" height="44" />
    <rect x="400" y="320" width="60" height="46" />
    <rect x="210" y="370" width="54" height="42" />
    <rect x="600" y="180" width="56" height="40" />
    <rect x="640" y="330" width="50" height="44" />
    <rect x="150" y="250" width="48" height="38" />
    <rect x="720" y="260" width="52" height="40" />
    <rect x="260" y="470" width="56" height="42" />
    <rect x="520" y="480" width="58" height="40" />
  </g>

  <!-- ══════════════════════════════════════
       NOMBRES DE JIRONES — ambientación cartográfica
  ══════════════════════════════════════ -->
  <g font-family="monospace" font-size="7.5" fill="#7A5C3A" opacity="0.45" letter-spacing="0.5">
    <text x="102" y="180" transform="rotate(-90 102 180)">JR. DE LA UNIÓN</text>
    <text x="362" y="86" >JR. ICA</text>
    <text x="622" y="86">JR. CARABAYA</text>
    <text x="800" y="180" transform="rotate(-90 800 180)">JR. ÁNCASH</text>
    <text x="222" y="86">JR. CUSCO</text>
  </g>

  <!-- ══════════════════════════════════════
       ROSA DE LOS VIENTOS — esquina inferior derecha
  ══════════════════════════════════════ -->
  <g transform="translate(820,545)" stroke="#B07D3A" fill="none" opacity="0.5">
    <circle r="22" stroke-width="1" />
    <line x1="0" y1="-22" x2="0" y2="22" stroke-width="0.75" />
    <line x1="-22" y1="0" x2="22" y2="0" stroke-width="0.75" />
    <path d="M0,-22 L4,-10 L0,-14 L-4,-10 Z" fill="#B07D3A" stroke="none" />
    <text x="-3" y="-27" font-family="monospace" font-size="8" fill="#B07D3A" stroke="none">N</text>
  </g>

  <!-- El plano organiza relaciones narrativas; no representa una escala exacta. -->
  <text x="50" y="580" font-family="monospace" font-size="7" letter-spacing="1"
        fill="#7A5C3A" opacity="0.55">ESQUEMA · SIN ESCALA</text>

  <!-- ══════════════════════════════════════
       SELLO DE CAMPO — esquina superior derecha
  ══════════════════════════════════════ -->
  <g transform="translate(700,30)" opacity="0.4">
    <rect x="0" y="0" width="150" height="30" fill="none" stroke="#7A5C3A" stroke-width="0.75" />
    <text x="8" y="13" font-family="monospace" font-size="7" letter-spacing="1" fill="#7A5C3A">LEVANTAMIENTO A MANO</text>
    <text x="8" y="24" font-family="monospace" font-size="7" letter-spacing="1" fill="#7A5C3A">CENTRO HISTÓRICO · G.M.</text>
  </g>
</svg>
