<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 48" preserveAspectRatio="none" role="presentation" aria-hidden="true">
  <title>Tira de película decorativa</title>

  <!-- Fondo de la tira: negro revelador -->
  <rect x="0" y="0" width="1440" height="48" fill="#0D0C0A" />

  <!-- Banda central de grano sutil -->
  <rect x="0" y="12" width="1440" height="24" fill="#1E1C18" />

  <!-- Línea de referencia superior e inferior (borde del fotograma) -->
  <line x1="0" y1="11" x2="1440" y2="11" stroke="#8A8478" stroke-width="0.75" />
  <line x1="0" y1="37" x2="1440" y2="37" stroke="#8A8478" stroke-width="0.75" />

  <!--
    Perforaciones (sprockets): color claro y alto contraste.
    Este SVG se muestra luego con opacity:0.35 sobre fondo oscuro (base.css),
    así que el contraste aquí debe ser fuerte para seguir siendo legible
    una vez atenuado — colores casi iguales al fondo desaparecen del todo.
  -->
  <defs>
    <pattern id="sprocket-top" x="6" y="0" width="24" height="48" patternUnits="userSpaceOnUse">
      <rect x="3" y="2" width="10" height="7" rx="1.5" fill="#C8B89A" />
    </pattern>
    <pattern id="sprocket-bottom" x="6" y="0" width="24" height="48" patternUnits="userSpaceOnUse">
      <rect x="3" y="39" width="10" height="7" rx="1.5" fill="#C8B89A" />
    </pattern>
    <pattern id="frame-ticks" x="0" y="0" width="120" height="48" patternUnits="userSpaceOnUse">
      <rect x="0" y="18" width="1.5" height="12" fill="#D9A15C" />
    </pattern>
  </defs>

  <rect x="0" y="0" width="1440" height="48" fill="url(#sprocket-top)" />
  <rect x="0" y="0" width="1440" height="48" fill="url(#sprocket-bottom)" />
  <rect x="0" y="0" width="1440" height="48" fill="url(#frame-ticks)" opacity="0.7" />

  <!-- Marca de laboratorio, cada 480px -->
  <g fill="#C8B89A" font-family="monospace" font-size="8" letter-spacing="1.5" opacity="0.85">
    <text x="30" y="27">35mm</text>
    <text x="510" y="27">35mm</text>
    <text x="990" y="27">35mm</text>
  </g>
</svg>
